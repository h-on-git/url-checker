<!DOCTYPE html>
<html>
<head>
        <title>URL Checker</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <style>
        #status {
        white-space: pre-line;
        }
        </style>
</head>
<body class="bg-light">
    <div >
        <div class="container p-5 mt-5 shadow-lg" style="max-width: 60%;">
            <div class="mb-4">
            <h1 class="fw-bold mb-2">URL Checker</h1>
            <p class="text-muted">Enter an URL to check if it exists</p>
            </div>
            <h4>URL</h4>
            <input class="form-control form-control-lg" type="text" id ="urlInput" placeholder="Enter URL" />
            <div id="status" class="mt-3"></div>
            <hr>
            <div class="mt-4 small text-muted">
                        Example URLs:
                        <ul class="mb-0">
                            <li>https://example.com/file.txt</li>
                            <li>https://example.com/docs/</li>
                        </ul>
                    </div>
        </div>
    </div>    
    <script type="module" src="app.js"></script>

    <script>
    const statusElement = document.getElementById("status");

    function styleStatus() {
        const text = statusElement.textContent.trim();
        statusElement.className = "mt-3 fw-semibold";

        if (text === "") {
            statusElement.style.display = "none";
            return;
        }

        statusElement.style.display = "block";

        if (text.includes("Checking") || text.includes("Waiting")) {
            statusElement.classList.add("alert","alert-primary");
        } 
        else if (text.includes("URL exists")) {
            statusElement.classList.add("alert","alert-success");
        } 
        else if (text.includes("Invalid") || text.includes("does not exist")) {
            statusElement.classList.add("alert","alert-danger");
        }
    }

    const observer = new MutationObserver(styleStatus);

    observer.observe(statusElement, {
        childList: true,
        characterData: true,
        subtree: true
    });
</script>
    
</body>
</html>
